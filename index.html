<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raja Kost Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        corePlugins: {
          preflight: false,
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-decor" aria-hidden="true">
      <span class="bubble bubble-1"></span>
      <span class="bubble bubble-2"></span>
      <span class="bubble bubble-3"></span>
      <span class="bubble bubble-4"></span>
      <span class="stripe stripe-1"></span>
      <span class="stripe stripe-2"></span>
    </div>

    <aside class="side-menu" id="sideMenu" aria-hidden="true">
      <div class="side-menu__panel">
        <div class="side-menu__header">
          <img src="assets/icon/ChatGPT Image Jun 3, 2026, 04_53_08 AM.png" alt="Raja Kost" />
          <div>
            <p class="menu-label">Akun</p>
            <h2 id="menuEmail">Belum login</h2>
          </div>
        </div>
        <nav class="side-menu__list" id="menuList"></nav>
      </div>
    </aside>

    <div class="picker-modal" id="roomPicker" aria-hidden="true">
      <div class="picker-panel">
        <div class="picker-handle"></div>
        <h3>Pilih Kamar</h3>
        <p class="picker-sub">Tentukan tipe dan kode kamar sebelum lanjut ke pembayaran.</p>
        <div class="picker-block">
          <label>Tipe Kamar</label>
          <div class="chip-set" id="pickerTypeChips"></div>
        </div>
        <div class="picker-block">
          <label>Kode Kamar</label>
          <div class="chip-set" id="pickerCodeChips"></div>
        </div>
        <div class="picker-actions">
          <button type="button" class="btn ghost" id="pickerCancel">Batal</button>
          <button type="button" class="btn primary" id="pickerConfirm" disabled>Konfirmasi</button>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <main class="app-shell">
      <section id="appView"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
